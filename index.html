<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fbeee6" />
    <title>Happy Birthday, Filip</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Nunito+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script
  src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.14/dist/dotlottie-wc.js"
  type="module"
></script>
  </head>
  <body>
    <main class="scene" aria-labelledby="title">
      <!-- <p class="eyebrow">[]]</p> -->

      <h1 class="title" id="title">
        <span class="line line-1">Happy Birthday,</span>
        <span class="line line-2">Filip</span>
      </h1>

      <!-- Lottie cake renders here -->
      <dotlottie-wc
  src="https://lottie.host/bd5a599e-889c-4782-8208-8a79c67ba0b8/t9PBw4Z5fr.lottie"
  style="width: 300px;height: 300px"
  autoplay
  loop
></dotlottie-wc>
      <button id="gift" class="gift-btn" type="button">
        <span class="gift-btn__label">Gift</span>
      </button>
    </main>

    <!-- Libraries via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
